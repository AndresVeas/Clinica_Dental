{% extends "layout.html" %}

{% block title %}Owner Dashboard{% endblock %}

{% block main %}
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<div class="container mt-4">
  <h3 style="color: var(--main-blue); margin-bottom: 20px;">Business Analytics</h3>
  
  <ul class="nav nav-pills mb-4" id="pills-tab" role="tablist">
    <li class="nav-item" role="presentation">
      <button class="nav-link active" id="earnings-tab" data-bs-toggle="pill" data-bs-target="#earnings" type="button" role="tab">Monthly Earnings</button>
    </li>
    <li class="nav-item" role="presentation">
      <button class="nav-link" id="trend-tab" data-bs-toggle="pill" data-bs-target="#trend" type="button" role="tab">Earnings Trend</button>
    </li>
    <li class="nav-item" role="presentation">
      <button class="nav-link" id="spec-appts-tab" data-bs-toggle="pill" data-bs-target="#spec-appts" type="button" role="tab">Top Specialty (This Month)</button>
    </li>
  </ul>

  <div class="tab-content bg-white p-4 rounded shadow-sm" id="pills-tabContent">
    
    <div class="tab-pane fade show active" id="earnings" role="tabpanel">
        <h5 class="text-center mb-3">Total Earnings (Last 5 Months)</h5>
        <div style="height: 400px; display: flex; justify-content: center;">
            <canvas id="monthlyChart"></canvas>
        </div>
    </div>

    <div class="tab-pane fade" id="trend" role="tabpanel">
        <h5 class="text-center mb-3">Earnings Trend</h5>
        <div style="height: 400px; display: flex; justify-content: center;">
            <canvas id="trendChart"></canvas>
        </div>
    </div>

    <div class="tab-pane fade" id="spec-appts" role="tabpanel">
        <h5 class="text-center mb-3">Appointments by Specialty (Current Month)</h5>
        <div style="height: 400px; display: flex; justify-content: center;">
            <canvas id="apptsSpecChart"></canvas>
        </div>
    </div>
  </div>

<script>
  // Variables passed from the Flask backend securely
  const specialtiesThisMonth = JSON.parse('{{ data.specialties_this_month | tojson | safe }}');
  const apptsDataThisMonth = JSON.parse('{{ data.appointments_count_this_month | tojson | safe }}');
  
  const months = JSON.parse('{{ data.months | tojson | safe }}');
  const monthlyEarnings = JSON.parse('{{ data.monthly_earnings | tojson | safe }}');

  // Function to generate dynamic colors depending on the value
  function getDynamicColors(data) {
    const maxVal = Math.max(...data);
    return data.map(value => {
        // Calculate intensity based on value vs max
        const intensity = Math.max(0.4, value / maxVal); // Minimum 0.4 so it's not too light
        // Generate blue color with varying opacity/intensity
        return `rgba(37, 117, 203, ${intensity})`;
    });
  }

  // 1. Monthly Earnings Chart (Bar Chart)
  new Chart(document.getElementById('monthlyChart'), {
    type: 'bar',
    data: {
      labels: months,
      datasets: [{
        label: 'Revenue ($)',
        data: monthlyEarnings,
        backgroundColor: getDynamicColors(monthlyEarnings),
        borderColor: '#2575cb',
        borderWidth: 1
      }]
    },
    options: { 
        maintainAspectRatio: false,
        responsive: true
    }
  });

  // 2. Earnings Trend Chart (Line Chart)
  new Chart(document.getElementById('trendChart'), {
    type: 'line',
    data: {
      labels: months,
      datasets: [{
        label: 'Earnings Trend ($)',
        data: monthlyEarnings,
        borderColor: '#198754',
        backgroundColor: 'rgba(25, 135, 84, 0.2)',
        fill: true,
        tension: 0.3
      }]
    },
    options: { 
        maintainAspectRatio: false,
        responsive: true
    }
  });

  // 3. Appointments by Specialty this month (Pie Chart)
  new Chart(document.getElementById('apptsSpecChart'), {
    type: 'pie',
    data: {
      labels: specialtiesThisMonth,
      datasets: [{
        data: apptsDataThisMonth,
        backgroundColor: ['#0dcaf0', '#2575cb', '#198754', '#ffc107', '#dc3545', '#6f42c1', '#d63384', '#fd7e14']
      }]
    },
    options: { 
        maintainAspectRatio: false,
        responsive: true
    }
  });
</script>
{% endblock %}

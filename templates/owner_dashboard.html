{% extends "layout.html" %}

{% block title %}Owner Dashboard{% endblock %}

{% block main %}
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<div class="container mt-4">
  <h3 style="color: var(--main-blue); margin-bottom: 20px;">Business Analytics</h3>
  
  <ul class="nav nav-pills mb-4" id="pills-tab" role="tablist">
    <li class="nav-item" role="presentation">
      <button class="nav-link active" id="earnings-tab" data-bs-toggle="pill" data-bs-target="#earnings" type="button" role="tab">Monthly Earnings</button>
    </li>
    <li class="nav-item" role="presentation">
      <button class="nav-link" id="spec-earnings-tab" data-bs-toggle="pill" data-bs-target="#spec-earnings" type="button" role="tab">Earnings by Specialty</button>
    </li>
    <li class="nav-item" role="presentation">
      <button class="nav-link" id="spec-appts-tab" data-bs-toggle="pill" data-bs-target="#spec-appts" type="button" role="tab">Appointments by Specialty</button>
    </li>
  </ul>

  <div class="tab-content bg-white p-4 rounded shadow-sm" id="pills-tabContent">
    
    <div class="tab-pane fade show active" id="earnings" role="tabpanel">
        <h5 class="text-center mb-3">Total Earnings (Last 6 Months)</h5>
        <div style="height: 400px; display: flex; justify-content: center;">
            <canvas id="monthlyChart"></canvas>
        </div>
    </div>

    <div class="tab-pane fade" id="spec-earnings" role="tabpanel">
        <h5 class="text-center mb-3">Earnings Distribution by Specialty</h5>
        <div style="height: 400px; display: flex; justify-content: center;">
            <canvas id="earningsSpecChart"></canvas>
        </div>
    </div>

    <div class="tab-pane fade" id="spec-appts" role="tabpanel">
        <h5 class="text-center mb-3">Appointment Volume by Specialty</h5>
        <div style="height: 400px; display: flex; justify-content: center;">
            <canvas id="apptsSpecChart"></canvas>
        </div>
    </div>
  </div>
</div>

<script>
  // Variables pasadas desde el backend de Flask de forma segura
  const specialties = JSON.parse('{{ data.specialties | tojson | safe }}');
  const earningsData = JSON.parse('{{ data.earnings | tojson | safe }}');
  const apptsData = JSON.parse('{{ data.appointments_count | tojson | safe }}');

  // 1. Gráfico de Ganancias Mensuales (Bar Chart)
  new Chart(document.getElementById('monthlyChart'), {
    type: 'bar',
    data: {
      labels: ['Sep', 'Oct', 'Nov', 'Dec', 'Jan', 'Feb'],
      datasets: [{
        label: 'Revenue ($)',
        data: [3000, 4200, 3800, 5000, 4100, 5600],
        backgroundColor: '#2575cb'
      }]
    },
    options: { 
        maintainAspectRatio: false,
        responsive: true
    }
  });

  // 2. Gráfico de Ganancias por Especialidad (Pie Chart)
  new Chart(document.getElementById('earningsSpecChart'), {
    type: 'pie',
    data: {
      labels: specialties,
      datasets: [{
        data: earningsData,
        backgroundColor: ['#0dcaf0', '#2575cb', '#198754', '#ffc107']
      }]
    },
    options: { 
        maintainAspectRatio: false,
        responsive: true
    }
  });

  // 3. Gráfico de Citas por Especialidad (Doughnut Chart)
  new Chart(document.getElementById('apptsSpecChart'), {
    type: 'doughnut',
    data: {
      labels: specialties,
      datasets: [{
        data: apptsData,
        backgroundColor: ['#0dcaf0', '#2575cb', '#198754', '#ffc107']
      }]
    },
    options: { 
        maintainAspectRatio: false,
        responsive: true
    }
  });
</script>
{% endblock %}

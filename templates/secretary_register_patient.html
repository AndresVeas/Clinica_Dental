{% extends "layout.html" %}

{% block title %}Register Patient{% endblock %}

{% block main %}
<div class="container mt-4 mb-5" style="max-width: 700px;">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 style="color: #495057; font-weight: 300;">✕ PATIENT Form</h3>
    </div>

    <form method="post" action="/secretary/register_patient" class="bg-white p-5 rounded shadow-sm border">
        <div class="mb-4">
            <label for="cedula" class="form-label text-muted small fw-bold">PATIENT ID (Cédula): *</label>
            <input type="text" class="form-control" id="cedula" name="cedula" required maxlength="10" minlength="10" pattern="\d{10}" title="Must be exactly 10 digits" oninput="this.value = this.value.replace(/[^0-9]/g, '');" placeholder="e.g. 1700000000">
        </div>

        <div class="mb-4">
            <label for="nombres" class="form-label text-muted small fw-bold">First Name *</label>
            <input type="text" class="form-control" id="nombres" name="nombres" required style="text-transform: uppercase;" oninput="this.value = this.value.toUpperCase();">
        </div>

        <div class="mb-4">
            <label for="apellidos" class="form-label text-muted small fw-bold">Last Name *</label>
            <input type="text" class="form-control" id="apellidos" name="apellidos" required style="text-transform: uppercase;" oninput="this.value = this.value.toUpperCase();">
        </div>

        <div class="mb-4">
            <label for="celular" class="form-label text-muted small fw-bold">MOBILE PHONE: *</label>
            <input type="text" class="form-control" id="celular" name="celular" required maxlength="10" oninput="this.value = this.value.replace(/[^0-9]/g, '');">
        </div>

        <div class="mb-4">
            <label for="correo" class="form-label text-muted small fw-bold">EMAIL: *</label>
            <input type="email" class="form-control" id="correo" name="correo" required>
        </div>

        <div class="mb-4">
            <label for="fecha_nacimiento" class="form-label text-muted small fw-bold">BIRTH DATE: *</label>
            <input type="date" class="form-control" id="fecha_nacimiento" name="fecha_nacimiento" required>
        </div>

        <hr class="my-4">

        <div class="mb-4">
            <label for="nombre_completo" class="form-label text-muted small fw-bold">FULL NAME:</label>
            <input type="text" class="form-control bg-light" id="nombre_completo" readonly>
        </div>

        <div class="mb-4">
            <label for="edad" class="form-label text-muted small fw-bold">AGE:</label>
            <input type="text" class="form-control bg-light" id="edad" readonly>
        </div>

        <div class="d-flex justify-content-end" style="gap: 10px;">
            <a href="/secretary" class="btn btn-outline-secondary">Cancel</a>
            <button type="submit" class="btn btn-info text-white">Save</button>
        </div>
    </form>
</div>

<script>
    // JS to auto-fill Full Name and Age
    const fnInput = document.getElementById('nombres');
    const lnInput = document.getElementById('apellidos');
    const fullInput = document.getElementById('nombre_completo');
    const dobInput = document.getElementById('fecha_nacimiento');
    const ageInput = document.getElementById('edad');

    function updateFullName() {
        fullInput.value = `${fnInput.value} ${lnInput.value}`.trim();
    }

    fnInput.addEventListener('input', updateFullName);
    lnInput.addEventListener('input', updateFullName);

    dobInput.addEventListener('change', function() {
        if(this.value) {
            const dob = new Date(this.value);
            const diff_ms = Date.now() - dob.getTime();
            const age_dt = new Date(diff_ms); 
            ageInput.value = Math.abs(age_dt.getUTCFullYear() - 1970);
        } else {
            ageInput.value = '';
        }
    });
</script>
{% endblock %}

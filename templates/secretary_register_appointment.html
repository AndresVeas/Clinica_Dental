{% extends "layout.html" %}
{% block title %}Register Appointment{% endblock %}
{% block main %}
<div class="container mt-4 mb-5" style="max-width: 700px;">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 style="color: #495057; font-weight: 300;">✕ APPOINTMENTS Form</h3>
    </div>
    <form method="post" action="/secretary/register_appointment" class="bg-white p-5 rounded shadow-sm border">
        <div class="mb-4">
            <label for="search_cedula" class="form-label text-muted small fw-bold">Patient ID (Cédula): *</label>
            <div class="input-group">
                <input type="text" id="search_cedula" class="form-control" placeholder="Enter 10-digit ID number" required autocomplete="off" maxlength="10" minlength="10" oninput="this.value = this.value.replace(/[^0-9]/g, '');">
                <button class="btn btn-outline-info" type="button" id="btn_search">Search</button>
            </div>
            <small id="search_result" class="text-muted d-block mt-1">Please search for a patient ID.</small>
        </div>
        <div class="mb-4">
            <label class="form-label text-muted small fw-bold">Patient Name:</label>
            <input type="text" class="form-control bg-light" id="patient_name_display" readonly placeholder="Patient name will appear here after search" required>
            <input type="hidden" id="patient_id" name="patient_id" required>
        </div>
        <hr class="my-4">
        <div class="mb-4">
            <label for="doctor_id" class="form-label text-muted small fw-bold">Doctor ID / Assign to: *</label>
            <select class="form-select" id="doctor_id" name="doctor_id" required>
                <option value="" selected disabled>Select the doctor...</option>
                {% for d in doctors %}
                    <option value="{{ d.user_id }}">Dr. {{ d.first_name }} {{ d.last_name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="mb-4">
            <label for="appointment_date" class="form-label text-muted small fw-bold">Appointment Date *</label>
            <input type="date" class="form-control" id="appointment_date" name="appointment_date" required>
        </div>
        <div class="mb-4">
            <label for="appointment_time" class="form-label text-muted small fw-bold">Appointment Time * (30-min slots)</label>
            <select class="form-select" id="appointment_time" name="appointment_time" required disabled>
                <option value="" selected disabled>Select doctor and date first...</option>
            </select>
        </div>
        <div class="mb-4">
            <label for="status" class="form-label text-muted small fw-bold">Status *</label>
            <select class="form-select" id="status" name="status" required>
                <option value="scheduled" selected>Scheduled</option>
                <option value="attended">Attended</option>
                <option value="cancelled">Cancelled</option>
            </select>
        </div>
        <div class="d-flex justify-content-end" style="gap: 10px;">
            <a href="/secretary" class="btn btn-outline-secondary">Cancel</a>
            <button type="submit" class="btn btn-info text-white">Save</button>
        </div>
    </form>
</div>
<script>
    const searchInput = document.getElementById('search_cedula');
    const hiddenPatientId = document.getElementById('patient_id');
    const patientNameDisplay = document.getElementById('patient_name_display');
    const resultText = document.getElementById('search_result');

    document.getElementById('btn_search').addEventListener('click', async () => {
        const cedula = searchInput.value.trim();
        if (cedula.length !== 10) {
            resultText.textContent = "ID must be exactly 10 digits.";
            resultText.className = "text-danger d-block mt-1";
            return;
        }
        try {
            const response = await fetch(`/api/get_patient/${cedula}`);
            const data = await response.json();
            if (data.success) {
                hiddenPatientId.value = data.patient.patient_id;
                patientNameDisplay.value = `${data.patient.last_name} ${data.patient.first_name}`;
                resultText.textContent = `Patient found successfully!`;
                resultText.className = "text-success d-block mt-1";
            } else {
                hiddenPatientId.value = ""; display.value = "";
                resultText.textContent = "Patient not found. Check the ID number.";
                resultText.className = "text-danger d-block mt-1";
            }
        } catch (error) { console.error("Error fetching patient:", error); }
    });

    const doctorSelect = document.getElementById('doctor_id');
    const dateInput = document.getElementById('appointment_date');
    const timeSelect = document.getElementById('appointment_time');

    async function fetchAvailableSlots() {
        const dId = doctorSelect.value; const dVal = dateInput.value;
        if (!dId || !dVal) { timeSelect.disabled = true; return; }
        try {
            const res = await fetch(`/api/available_slots?doctor_id=${dId}&date=${dVal}`);
            const data = await res.json();
            timeSelect.innerHTML = '<option value="" selected disabled>Select the time...</option>';
            if (data.slots && data.slots.length > 0) {
                data.slots.forEach(slot => {
                    const opt = document.createElement('option');
                    opt.value = opt.textContent = slot; timeSelect.appendChild(opt);
                });
                timeSelect.disabled = false;
            } else { timeSelect.innerHTML = '<option value="" selected disabled>No times available.</option>'; }
        } catch (error) { console.error("Error fetching slots:", error); }
    }
    doctorSelect.addEventListener('change', fetchAvailableSlots);
    dateInput.addEventListener('change', fetchAvailableSlots);
</script>
{% endblock %}

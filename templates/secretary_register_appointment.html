{% extends "layout.html" %}

{% block title %}Register Appointment{% endblock %}

{% block main %}
<div class="container mt-4 mb-5" style="max-width: 700px;">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 style="color: #495057; font-weight: 300;">✕ CITAS Form</h3>
    </div>

    <form method="post" action="/secretary/register_appointment" class="bg-white p-5 rounded shadow-sm border">
        
        <div class="mb-4">
            <label class="form-label text-muted small fw-bold">Buscar Paciente por Cédula (Opcional)</label>
            <div class="input-group">
                <input type="text" id="search_cedula" class="form-control" placeholder="Ingrese número de cédula">
                <button class="btn btn-outline-info" type="button" id="btn_search">Buscar</button>
            </div>
            <small id="search_result" class="text-success d-none mt-1">¡Paciente encontrado y seleccionado!</small>
        </div>

        <div class="mb-4">
            <label for="patient_id" class="form-label text-muted small fw-bold">Cedula_Cliente / Paciente: *</label>
            <select class="form-select" id="patient_id" name="patient_id" required>
                <option value="" selected disabled>Seleccione el paciente...</option>
                {% for p in patients %}
                    <option value="{{ p.patient_id }}">{{ p.cedula }} - {{ p.last_name }} {{ p.first_name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-4">
            <label for="fecha_cita" class="form-label text-muted small fw-bold">Fecha_Cita *</label>
            <input type="date" class="form-control" id="fecha_cita" name="fecha_cita" required>
        </div>

        <div class="mb-4">
            <label for="hora_cita" class="form-label text-muted small fw-bold">Hora_Cita *</label>
            <input type="time" class="form-control" id="hora_cita" name="hora_cita" required>
        </div>

        <div class="mb-4">
            <label for="doctor_id" class="form-label text-muted small fw-bold">Cedula_Doctor / Asignar a: *</label>
            <select class="form-select" id="doctor_id" name="doctor_id" required>
                <option value="" selected disabled>Seleccione el doctor...</option>
                {% for d in doctors %}
                    <option value="{{ d.user_id }}">Dr. {{ d.first_name }} {{ d.last_name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-4">
            <label for="especialidad" class="form-label text-muted small fw-bold">ESPECIALIDAD *</label>
            <select class="form-select" id="especialidad" name="especialidad" required>
                <option value="" selected disabled>Seleccione la especialidad...</option>
                {% for s in specialties %}
                    <option value="{{ s.specialty_id }}">{{ s.description }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-4">
            <label for="estado" class="form-label text-muted small fw-bold">Estado *</label>
            <select class="form-select" id="estado" name="estado" required>
                <option value="scheduled" selected>Scheduled (Programada)</option>
                <option value="attended">Attended (Atendida)</option>
                <option value="cancelled">Cancelled (Cancelada)</option>
            </select>
        </div>

        <div class="d-flex justify-content-end" style="gap: 10px;">
            <a href="/secretary" class="btn btn-outline-secondary">Cancel</a>
            <button type="submit" class="btn btn-info text-white">Save</button>
        </div>
    </form>
</div>

<script>
    // JS for the Cedula Search functionality
    document.getElementById('btn_search').addEventListener('click', async () => {
        const cedula = document.getElementById('search_cedula').value.trim();
        const resultText = document.getElementById('search_result');
        
        if (!cedula) return;

        try {
            const response = await fetch(`/api/get_patient/${cedula}`);
            const data = await response.json();

            if (data.success) {
                // Auto-select the patient in the dropdown
                document.getElementById('patient_id').value = data.patient.patient_id;
                resultText.textContent = `¡Paciente encontrado! (${data.patient.last_name} ${data.patient.first_name})`;
                resultText.className = "text-success d-block mt-1";
            } else {
                resultText.textContent = "Paciente no encontrado. Verifique la cédula.";
                resultText.className = "text-danger d-block mt-1";
            }
        } catch (error) {
            console.error("Error fetching patient:", error);
        }
    });
</script>
{% endblock %}
